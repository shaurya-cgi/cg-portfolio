<html>
    <head>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <nav>
            <a href="index.html">
                <img src="images/logo.png" alt="CG Infinity Logo">
            </a>
            <div class="navbar-links">
                <a href="login.html">Login</a>
                <a href="about.html">About</a>
                <a href="contact.html">Contact</a>
            </div>
        </nav>
        
        <main>
            <h1>Signup</h1>
            <form action="Signup">
                <label for="text">Enter Full Name</label>
                <input type="name" name="name" class="loginform" placeholder="Enter full name">
                <br><br>
                <label for="email">Enter Email Address</label>
                <input type="email" name="email" class="loginform" placeholder="Enter email">
                <br><br>
                <label for="password">Enter Password</label>
                <input type="password" name="password" class="loginform" placeholder="Enter password">

                <br><br>
                
                <label for="password">Confirm Password</label>
                <input type="password" name="confirm_password" class="loginform" placeholder="Confirm password">
                <br><br>
                <label for="gender" id="gender">Gender:</label>
                <input type="radio" name="gender">Male
                <input type="radio" name="gender">Female
                <br><br>
                <label for="yoe">Enter Years of Experience</label>
                <input type="number" name="yoe" class="yoe" placeholder="Years of Experience">
                <br><br>
                <label for="yoe">Enter Contact Number</label>
                <input type="tel" name="contact" class="contact" placeholder="Enter contact number">
                <br><br>
                <input type="checkbox">Terms and Conditions
                <br><br>
                
                <button type="submit">Submit</button>
                <button type="reset">Reset</button>

            </form>

            <p>Already have an account?</p>
            <a href="login.html">Login</a>
            
        </main>

        <footer>
            <p>Established in 1998</p>
        </footer>
    </body>
</html>
